name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  orchestrator-tests-v4:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: versions_dep/v4/apps/orchestrator
    env:
      OPENROUTER_API_KEY: or-ci-test-key
      ORCHESTRATOR_API_KEY: ci-test-key
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.3"
      - name: Sync and pytest (v4 OpenRouter Survival Engine)
        run: |
          uv sync --extra dev
          uv run pytest -q
      - name: Ops simulator (mock E2E)
        run: |
          uv run python -m gpthub_orchestrator.tools.ops_simulator --mode=mock --report=/tmp/ops-mock.json
