# LiteLLM proxy aliases (versions_dep/v2_c2/litellm/config.yaml). Committed, no secrets.
# Цепочки: локальный gpt-hub-turbo первым для всего текста; OpenRouter только fallback + vision.
version: 1
roles:
  fast_text_chat:
    aliases:
      - gpt-hub-turbo
      - gpt-hub-fallback
  fast_text:
    aliases:
      - gpt-hub-turbo
      - gpt-hub-fallback
  reasoning_code_local:
    aliases:
      - gpt-hub-turbo
      - gpt-hub-fallback
  reasoning_code_openrouter:
    aliases:
      - gpt-hub-turbo
      - gpt-hub-fallback
  vision_general:
    aliases:
      - gpt-hub-vision
      - gpt-hub-fallback
  doc_synthesis:
    aliases:
      - gpt-hub-turbo
      - gpt-hub-fallback
